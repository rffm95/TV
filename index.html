<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Roleta Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap');

        * { cursor: none !important; user-select: none; outline: none !important; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        #roleta-screen {
            position: absolute; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #1a000a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        .main-layout { display: flex; align-items: center; justify-content: center; gap: 5vw; flex: 1; width: 100%; }
        .side-title { color: #fff; font-size: 4vw; font-weight: 900; text-transform: uppercase; line-height: 0.9; text-shadow: 0 0 20px #D4AF37; }
        .side-title span { color: #ff0055; }

        /* CONTENTOR DA RODA */
        .wheel-box { position: relative; width: 70vh; height: 70vh; }
        
        /* SETA (PONTEIRO) */
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 25px solid transparent; 
            border-right: 25px solid transparent; border-top: 45px solid #fff; z-index: 100;
        }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #D4AF37;
            position: relative; overflow: hidden;
            transition: transform 6s cubic-bezier(0.1, 0.8, 0.1, 1);
            background: conic-gradient(
                #111 0deg 40deg,    #ff0055 40deg 80deg,
                #111 80deg 120deg,  #ff0055 120deg 160deg,
                #111 160deg 200deg, #ff0055 200deg 240deg,
                #111 240deg 280deg, #ff0055 280deg 320deg,
                #D4AF37 320deg 360deg
            );
        }

        /* TEXTO DAS FATIAS - ALINHAMENTO CORRIGIDO */
        .slice-text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%; /* Metade do círculo */
            height: 2px;
            transform-origin: left center;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Empurra o texto para a borda */
        }

        .slice-text {
            color: #fff;
            font-weight: 900;
            font-size: 1.8vh; /* Tamanho para TV 85" */
            text-transform: uppercase;
            padding-right: 35px; /* Margem da borda dourada */
            text-shadow: 2px 2px 5px #000;
            white-space: nowrap;
        }

        #resultado {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.98); border: 6px solid #D4AF37; padding: 6vh;
            border-radius: 25px; color: #fff; font-size: 5vw; font-weight: 900;
            text-align: center; z-index: 200; transition: transform 0.5s;
            box-shadow: 0 0 100px #000;
        }
        #resultado.show { transform: translate(-50%, -50%) scale(1); }

        .footer-hint { margin-bottom: 5vh; color: #D4AF37; font-size: 2vw; font-weight: 700; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="roleta-screen">
        <div style="margin-top: 5vh; color: #fff; font-size: 2.5vw; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid #ff0055; padding-bottom: 10px;">
            CHEERS O BAR
        </div>

        <div class="main-layout">
            <div class="side-title">ROLETA<br><span>DO CHEERS</span></div>
            
            <div class="wheel-box">
                <div class="pointer"></div>
                <div id="wheel" class="wheel"></div>
            </div>

            <div class="side-title" style="text-align: right;">GANHA<br><span>PRÉMIOS</span></div>
        </div>

        <div id="hint" class="footer-hint">CARREGA EM QUALQUER BOTÃO DO COMANDO!</div>
    </div>

    <div id="resultado"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const resultado = document.getElementById('resultado');
        const hint = document.getElementById('hint');
        
        let aRodar = false;
        let rotacaoTotal = 0;

        const fatias = [
            { id: 0, texto: 'TENTA OUTRA VEZ' },
            { id: 1, texto: 'OFERTA 1 FINO' },
            { id: 2, texto: 'OFERTA 1 RÉGUA' },
            { id: 3, texto: 'TENTA OUTRA VEZ' },
            { id: 4, texto: 'OFERTA 1 FINO' },
            { id: 5, texto: 'TENTA OUTRA VEZ' },
            { id: 6, texto: 'OFERTA 1 FINO' },
            { id: 7, texto: 'OFERTA 1 RÉGUA' },
            { id: 8, texto: 'JACKPOT: 5 SHOTS!' }
        ];

        // GERAÇÃO DOS TEXTOS COM ALINHAMENTO RADIAL
        fatias.forEach((f, i) => {
            const container = document.createElement('div');
            container.className = 'slice-text-container';
            
            // Rodar o container para o centro da fatia (cada fatia 40deg, +20deg para centrar)
            const angulo = (i * 40) + 20; 
            container.style.transform = `rotate(${angulo}deg)`;
            
            const span = document.createElement('span');
            span.className = 'slice-text';
            span.innerText = f.texto;
            
            container.appendChild(span);
            wheel.appendChild(container);
        });

        function girar() {
            if (aRodar) {
                if (resultado.classList.contains('show')) resultado.classList.remove('show');
                return;
            }

            aRodar = true;
            resultado.classList.remove('show');
            hint.style.visibility = 'hidden';

            const sorte = Math.random() * 100;
            let ganhador;
            if (sorte < 5) ganhador = fatias[8]; // Jackpot
            else if (sorte < 30) ganhador = fatias[Math.random() > 0.5 ? 2 : 7];
            else if (sorte < 70) ganhador = fatias[Math.random() > 0.5 ? 1 : 4];
            else ganhador = fatias[Math.random() > 0.5 ? 0 : 3];

            // Cálculo para parar debaixo da seta (topo = 270deg offset)
            const anguloFatia = (ganhador.id * 40) + 20;
            const voltasExtra = (Math.floor(Math.random() * 4) + 10) * 360;
            
            rotacaoTotal = voltasExtra + (360 - anguloFatia);
            wheel.style.transform = `rotate(${rotacaoTotal}deg)`;

            setTimeout(() => {
                aRodar = false;
                resultado.innerHTML = ganhador.texto + "<br><span style='font-size:2vw; color:#888; text-transform: none;'>Prime qualquer tecla para continuar</span>";
                resultado.classList.add('show');
                hint.style.visibility = 'visible';
            }, 6200);
        }

        // COMANDO HISENSE (VIDAA)
        window.addEventListener('keydown', (e) => {
            e.preventDefault();
            girar();
        });

        document.addEventListener('mousedown', (e) => {
            e.preventDefault();
            girar();
        });
    </script>
</body>
</html>
