<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Roleta Oficial Sincronizada</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap');

        * { cursor: none !important; user-select: none; outline: none !important; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        #roleta-screen {
            position: absolute; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #1a000a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 3vh 0;
        }

        .main-layout { display: flex; align-items: center; justify-content: center; gap: 5vw; flex: 1; width: 100%; }
        .side-title { color: #fff; font-size: 4vw; font-weight: 900; text-transform: uppercase; line-height: 0.9; text-shadow: 0 0 20px #D4AF37; }
        .side-title span { color: #ff0055; }

        .wheel-box { position: relative; width: 75vh; height: 75vh; }
        
        /* SETA BRANCA NO TOPO */
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 30px solid transparent; 
            border-right: 30px solid transparent; border-top: 60px solid #fff; z-index: 100;
        }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 15px solid #D4AF37;
            position: relative; overflow: hidden;
            transition: transform 7s cubic-bezier(0.1, 0, 0.1, 1);
            /* CORES DAS FATIAS (9 fatias de 40 graus) */
            background: conic-gradient(
                #D4AF37 0deg 40deg,    /* 0: Jackpot */
                #ff0055 40deg 80deg,   /* 1: Régua */
                #111 80deg 120deg,     /* 2: Tenta */
                #ff0055 120deg 160deg,  /* 3: Fino */
                #111 160deg 200deg,    /* 4: Tenta */
                #ff0055 200deg 240deg,  /* 5: Fino */
                #111 240deg 280deg,    /* 6: Tenta */
                #ff0055 280deg 320deg,  /* 7: Fino */
                #111 320deg 360deg     /* 8: Tenta */
            );
        }

        .slice-text-container {
            position: absolute; top: 50%; left: 50%; width: 50%; height: 2px;
            transform-origin: left center; display: flex; align-items: center; justify-content: flex-end;
        }

        .slice-text {
            color: #fff; font-weight: 900; font-size: 1.6vh; text-transform: uppercase;
            padding-right: 50px; text-shadow: 2px 2px 4px #000; white-space: nowrap;
        }

        #resultado {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.98); border: 10px solid #D4AF37; padding: 7vh;
            border-radius: 40px; color: #fff; font-size: 5vw; font-weight: 900;
            text-align: center; z-index: 200; transition: transform 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.4);
            box-shadow: 0 0 100px #000;
        }
        #resultado.show { transform: translate(-50%, -50%) scale(1); }

        .footer-hint { margin-bottom: 3vh; color: #D4AF37; font-size: 2vw; font-weight: 700; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="roleta-screen">
        <div style="color: #fff; font-size: 2.5vw; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid #ff0055; padding-bottom: 10px;">
            CHEERS O BAR
        </div>

        <div class="main-layout">
            <div class="side-title">ROLETA<br><span>DO CHEERS</span></div>
            <div class="wheel-box">
                <div class="pointer"></div>
                <div id="wheel" class="wheel"></div>
            </div>
            <div class="side-title" style="text-align: right;">GANHA<br><span>PRÉMIOS</span></div>
        </div>

        <div id="hint" class="footer-hint">CARREGA NO COMANDO PARA GIRAR!</div>
    </div>

    <div id="resultado"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const resultado = document.getElementById('resultado');
        const hint = document.getElementById('hint');
        
        let aRodar = false;
        let rotacaoAcumulada = 0;

        // ESTA LISTA TEM DE BATER CERTO COM O CONIC-GRADIENT DO CSS ACIMA
        const fatias = [
            { texto: 'JACKPOT: 5 SHOTS!', perde: false }, // 0: Dourado
            { texto: 'OFERTA 1 RÉGUA', perde: false },    // 1: Rosa
            { texto: 'TENTA OUTRA VEZ', perde: true },   // 2: Preto
            { texto: 'OFERTA 1 FINO', perde: false },     // 3: Rosa
            { texto: 'TENTA OUTRA VEZ', perde: true },   // 4: Preto
            { texto: 'OFERTA 1 FINO', perde: false },     // 5: Rosa
            { texto: 'TENTA OUTRA VEZ', perde: true },   // 6: Preto
            { texto: 'OFERTA 1 FINO', perde: false },     // 7: Rosa
            { texto: 'TENTA OUTRA VEZ', perde: true }    // 8: Preto
        ];

        // Criar textos
        fatias.forEach((f, i) => {
            const container = document.createElement('div');
            container.className = 'slice-text-container';
            container.style.transform = `rotate(${(i * 40) + 20}deg)`;
            const span = document.createElement('span');
            span.className = 'slice-text';
            span.innerText = f.texto;
            container.appendChild(span);
            wheel.appendChild(container);
        });

        function girar() {
            if (aRodar) {
                if (resultado.classList.contains('show')) resultado.classList.remove('show');
                return;
            }

            aRodar = true;
            resultado.classList.remove('show');
            hint.style.visibility = 'hidden';

            // 1. SORTEIO (Jackpot 10%, Régua 20%, Finos 35%, Tenta 35%)
            const sorte = Math.random() * 100;
            let index;
            if (sorte < 10) index = 0; 
            else if (sorte < 30) index = 1; 
            else if (sorte < 65) index = [3, 5, 7][Math.floor(Math.random() * 3)]; 
            else index = [2, 4, 6, 8][Math.floor(Math.random() * 4)];

            const ganhador = fatias[index];

            // 2. MATEMÁTICA DE PARAGEM (Calcula o centro da fatia escolhida)
            const centroFatia = (index * 40) + 20;
            const anguloDestino = 360 - centroFatia;
            
            // Define o número de voltas e garante que o movimento é sempre para a frente
            const voltasExtras = 10 * 360; 
            const baseDeRotacao = Math.ceil(rotacaoAcumulada / 360) * 360;
            rotacaoAcumulada = baseDeRotacao + voltasExtras + anguloDestino;

            wheel.style.transform = `rotate(${rotacaoAcumulada}deg)`;

            // 3. MOSTRAR RESULTADO
            setTimeout(() => {
                aRodar = false;
                const status = ganhador.perde ? 
                    "<span style='color: #ff0055;'>PERDESTE:</span>" : 
                    "<span style='color: #D4AF37;'>GANHASTE:</span>";
                
                resultado.innerHTML = `${status}<br>${ganhador.texto}<br><span style='font-size:1.5vw; color:#666; text-transform:none; font-weight:400;'>Prime para continuar</span>`;
                resultado.classList.add('show');
                hint.style.visibility = 'visible';
            }, 7200); 
        }

        // CONTROLOS
        window.addEventListener('keydown', (e) => { e.preventDefault(); girar(); });
        document.addEventListener('mousedown', (e) => { e.preventDefault(); girar(); });
    </script>
</body>
</html>
