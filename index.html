<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheers O Bar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        /* 1. MATAR O CURSOR NO CSS */
        * { 
            cursor: none !important; 
            outline: none !important; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        #tv-menu {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0,0,0,0.9); z-index: 100;
        }

        .logo { color: #fff; font-size: 5vw; margin-bottom: 50px; letter-spacing: 5px; }

        .menu-row { display: flex; gap: 20px; margin-bottom: 20px; }

        /* 2. TRANSFORMAR EM BUTTONS REAIS PARA A TV RECONHECER */
        .menu-item {
            background: #222; border: 4px solid #444; color: #888;
            padding: 20px 40px; font-size: 2.5vw; font-weight: 900;
            border-radius: 50px; transition: 0.2s;
            min-width: 250px; text-align: center;
        }

        /* O VIDAA foca em elementos :focus */
        .menu-item:focus {
            border-color: #D4AF37; color: #fff;
            background: #333; transform: scale(1.1);
            box-shadow: 0 0 30px rgba(212,175,55,0.5);
        }

        .hidden { display: none !important; }
        
        #media-container { width: 100vw; height: 100vh; }
        video, img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div id="tv-menu">
        <div class="logo">CHEERS O BAR</div>
        <div class="menu-row">
            <button class="menu-item" id="noite">NOITE</button>
            <button class="menu-item" id="menu">MENU</button>
        </div>
        <div class="menu-row">
            <button class="menu-item" id="roleta-btn">ROLETA</button>
            <button class="menu-item" id="cartas-btn">JOGO CARTAS</button>
        </div>
    </div>

    <div id="media-container" class="hidden">
        <video id="v-player" muted playsinline></video>
        <img id="i-player">
    </div>

    <script>
        const buttons = document.querySelectorAll('.menu-item');
        let currentIndex = 0;

        // Função para forçar o foco no botão atual
        function setFocus() {
            buttons[currentIndex].focus();
        }

        // 3. MATAR O CURSOR VIA JS (Mover para fora da tela)
        document.addEventListener('mousemove', () => {
            document.body.style.cursor = 'none';
        });

        // 4. LÓGICA DE NAVEGAÇÃO PARA HISENSE
        window.addEventListener('keydown', (e) => {
            // Impedir que a TV use as setas para rolar a página
            if([37,38,39,40,13].includes(e.keyCode)) e.preventDefault();

            switch(e.keyCode) {
                case 39: // Direita
                    currentIndex = (currentIndex + 1) % buttons.length;
                    break;
                case 37: // Esquerda
                    currentIndex = (currentIndex - 1 + buttons.length) % buttons.length;
                    break;
                case 40: // Baixo
                    if (currentIndex < 2) currentIndex += 2;
                    break;
                case 38: // Cima
                    if (currentIndex >= 2) currentIndex -= 2;
                    break;
                case 13: // OK / Enter
                    const action = buttons[currentIndex].id;
                    alert("A carregar: " + action); 
                    // Aqui chamas a tua função de abrir vídeo ou jogo
                    break;
                case 8: // Back (Botão de voltar do comando)
                case 461:
                case 10009:
                    location.reload(); // Recarrega para o menu
                    break;
            }
            setFocus();
        });

        // Iniciar com foco no primeiro botão após 1 segundo (tempo da TV processar)
        setTimeout(setFocus, 1000);

        // Se alguém tocar no ecrã ou usar rato, devolve o foco ao botão
        document.addEventListener('click', setFocus);
    </script>
</body>
</html>
