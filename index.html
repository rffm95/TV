<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Roleta Final Sincronizada</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap');

        * { cursor: none !important; user-select: none; outline: none !important; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        #roleta-screen {
            position: absolute; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #1a000a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        .main-layout { display: flex; align-items: center; justify-content: center; gap: 5vw; flex: 1; width: 100%; }
        .side-title { color: #fff; font-size: 4vw; font-weight: 900; text-transform: uppercase; line-height: 0.9; text-shadow: 0 0 20px #D4AF37; }
        .side-title span { color: #ff0055; }

        .wheel-box { position: relative; width: 72vh; height: 72vh; }
        
        /* SETA (PONTEIRO) NO TOPO */
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 25px solid transparent; 
            border-right: 25px solid transparent; border-top: 50px solid #fff; z-index: 100;
        }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #D4AF37;
            position: relative; overflow: hidden;
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
            /* GRADIENTE DEFINIDO DE 40 EM 40 GRAUS */
            background: conic-gradient(
                #D4AF37 0deg 40deg,   /* 0: JACKPOT (Dourado) */
                #ff0055 40deg 80deg,  /* 1: RÉGUA (Rosa) */
                #111 80deg 120deg,    /* 2: TENTA (Preto) */
                #ff0055 120deg 160deg, /* 3: FINO (Rosa) */
                #111 160deg 200deg,   /* 4: TENTA (Preto) */
                #ff0055 200deg 240deg, /* 5: FINO (Rosa) */
                #111 240deg 280deg,   /* 6: TENTA (Preto) */
                #ff0055 280deg 320deg, /* 7: FINO (Rosa) */
                #111 320deg 360deg    /* 8: TENTA (Preto) */
            );
        }

        .slice-text-container {
            position: absolute; top: 50%; left: 50%; width: 50%; height: 2px;
            transform-origin: left center; display: flex; align-items: center; justify-content: flex-end;
        }

        .slice-text {
            color: #fff; font-weight: 900; font-size: 1.8vh; text-transform: uppercase;
            padding-right: 40px; text-shadow: 2px 2px 5px #000; white-space: nowrap;
        }

        #resultado {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.98); border: 8px solid #D4AF37; padding: 6vh;
            border-radius: 30px; color: #fff; font-size: 5vw; font-weight: 900;
            text-align: center; z-index: 200; transition: transform 0.5s;
        }
        #resultado.show { transform: translate(-50%, -50%) scale(1); }

        .footer-hint { margin-bottom: 5vh; color: #D4AF37; font-size: 2vw; font-weight: 700; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="roleta-screen">
        <div style="margin-top: 5vh; color: #fff; font-size: 2.5vw; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid #ff0055;">CHEERS O BAR</div>

        <div class="main-layout">
            <div class="side-title">ROLETA<br><span>DO CHEERS</span></div>
            <div class="wheel-box">
                <div class="pointer"></div>
                <div id="wheel" class="wheel"></div>
            </div>
            <div class="side-title" style="text-align: right;">GANHA<br><span>PRÉMIOS</span></div>
        </div>

        <div id="hint" class="footer-hint">CARREGA EM QUALQUER BOTÃO DO COMANDO!</div>
    </div>

    <div id="resultado"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const resultado = document.getElementById('resultado');
        const hint = document.getElementById('hint');
        
        let aRodar = false;
        let rotacaoAcumulada = 0;

        // LISTA DE FATIAS (Mapeamento 1:1 com o conic-gradient acima)
        const fatias = [
            { texto: 'JACKPOT: 5 SHOTS!', perde: false }, // 0: Dourado
            { texto: 'OFERTA 1 RÉGUA', perde: false },     // 1: Rosa
            { texto: 'TENTA OUTRA VEZ', perde: true },    // 2: Preto
            { texto: 'OFERTA 1 FINO', perde: false },      // 3: Rosa
            { texto: 'TENTA OUTRA VEZ', perde: true },    // 4: Preto
            { texto: 'OFERTA 1 FINO', perde: false },      // 5: Rosa
            { texto: 'TENTA OUTRA VEZ', perde: true },    // 6: Preto
            { texto: 'OFERTA 1 FINO', perde: false },      // 7: Rosa
            { texto: 'TENTA OUTRA VEZ', perde: true }     // 8: Preto
        ];

        // Posicionar textos exatamente no centro de cada fatia de 40 graus
        fatias.forEach((f, i) => {
            const container = document.createElement('div');
            container.className = 'slice-text-container';
            const anguloTexto = (i * 40) + 20; 
            container.style.transform = `rotate(${anguloTexto}deg)`;
            const span = document.createElement('span');
            span.className = 'slice-text';
            span.innerText = f.texto;
            container.appendChild(span);
            wheel.appendChild(container);
        });

        function girar() {
            if (aRodar) {
                if (resultado.classList.contains('show')) resultado.classList.remove('show');
                return;
            }

            aRodar = true;
            resultado.classList.remove('show');
            hint.style.visibility = 'hidden';

            // 1. SORTEIO COM PROBABILIDADE CORRIGIDA
            const sorte = Math.random() * 100;
            let index;

            if (sorte < 10) index = 0;              // JACKPOT 10% (Fatia 0)
            else if (sorte < 30) index = 1;         // RÉGUA 20% (Fatia 1)
            else if (sorte < 65) index = [3, 5, 7][Math.floor(Math.random() * 3)]; // FINOS 35% (Fatias 3, 5, 7)
            else index = [2, 4, 6, 8][Math.floor(Math.random() * 4)]; // TENTA 35% (Fatias 2, 4, 6, 8)

            const ganhador = fatias[index];

            // 2. MATEMÁTICA DE PRECISÃO PARA SINCRONIA
            // A roleta roda no sentido horário. Para o prémio X parar no topo (0deg),
            // a roda deve girar 360 - centro_da_fatia.
            const centroFatia = (index * 40) + 20;
            const anguloDestino = 360 - centroFatia;
            
            // Adicionamos 12 voltas para impacto visual e compensamos a rotação anterior
            const voltasExtras = 12 * 360;
            const ajusteParaZero = 360 - (rotacaoAcumulada % 360);
            
            rotacaoAcumulada += ajusteParaZero + voltasExtras + anguloDestino;
            wheel.style.transform = `rotate(${rotacaoAcumulada}deg)`;

            // 3. EXIBIÇÃO DO RESULTADO FINAL
            setTimeout(() => {
                aRodar = false;
                const corStatus = ganhador.perde ? "#ff0055" : "#D4AF37";
                const titulo = ganhador.perde ? "PERDESTE:" : "GANHASTE:";
                
                resultado.innerHTML = `
                    <span style="color: ${corStatus}; text-shadow: 0 0 15px ${corStatus};">${titulo}</span><br>
                    ${ganhador.texto}<br>
                    <span style="font-size: 1.8vw; color: #888; text-transform: none; font-weight: 400;">Prime o comando para continuar</span>
                `;
                resultado.classList.add('show');
                hint.style.visibility = 'visible';
            }, 6200);
        }

        // EVENTOS PARA TV HISENSE (QUALQUER TECLA OU CLIQUE)
        window.addEventListener('keydown', (e) => { e.preventDefault(); girar(); });
        document.addEventListener('mousedown', (e) => { e.preventDefault(); girar(); });
    </script>
</body>
</html>
