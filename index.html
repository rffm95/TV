<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHEERS - MODO ROLETA EXPRESS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        * { cursor: none !important; user-select: none; outline: none !important; }
        
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: #000; color: #fff; overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Contentor da Roleta */
        #roleta-container {
            position: relative; width: 80vh; height: 80vh;
            border-radius: 50%; border: 15px solid #D4AF37;
            box-shadow: 0 0 50px rgba(212,175,55,0.5);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #d40000 0deg 45deg, #1a1a1a 45deg 90deg,
                #d40000 90deg 135deg, #1a1a1a 135deg 180deg,
                #d40000 180deg 225deg, #1a1a1a 225deg 270deg,
                #d40000 270deg 315deg, #1a1a1a 315deg 360deg
            );
        }

        /* Ponteiro */
        #seta {
            position: absolute; top: -20px; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 30px solid transparent; border-right: 30px solid transparent;
            border-top: 50px solid #D4AF37; z-index: 10;
        }

        #instrucao {
            position: absolute; bottom: 5vh; font-size: 3vw;
            color: #D4AF37; text-transform: uppercase; letter-spacing: 5px;
            animation: pisca 1.5s infinite;
        }

        @keyframes pisca { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        /* Centro da Roleta */
        #centro {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 10vh; height: 10vh; background: #D4AF37;
            border-radius: 50%; z-index: 5; border: 5px solid #fff;
        }
    </style>
</head>
<body>

    <div id="seta"></div>
    <div id="roleta-container">
        <div id="centro"></div>
    </div>

    <div id="instrucao">Carrega em QUALQUER botão</div>

    <script>
        const roleta = document.getElementById('roleta-container');
        let aRodar = false;
        let grausAtuais = 0;

        function rodarRoleta() {
            if (aRodar) return; // Impede clicar várias vezes enquanto roda

            aRodar = true;
            document.getElementById('instrucao').style.display = 'none';

            // Gera uma rotação aleatória (mínimo 5 voltas + aleatório)
            const extraGraus = Math.floor(Math.random() * 360) + 1800; 
            grausAtuais += extraGraus;

            roleta.style.transform = `rotate(${grausAtuais}deg)`;

            // Quando a animação acabar (4 segundos definidos no CSS)
            setTimeout(() => {
                aRodar = false;
                document.getElementById('instrucao').style.display = 'block';
                document.getElementById('instrucao').innerText = "Carrega para rodar de novo";
            }, 4000);
        }

        // --- A MAGIA PARA A HISENSE ---
        
        // 1. Qualquer tecla do comando dispara a roleta
        window.addEventListener('keydown', function(e) {
            // e.preventDefault(); // Removemos para evitar conflitos, queremos apenas detetar a pressão
            rodarRoleta();
        });

        // 2. Qualquer clique no ecrã (se o comando estiver em modo rato)
        document.addEventListener('click', function() {
            rodarRoleta();
        });

        // 3. Forçar o foco inicial
        window.onload = () => {
            window.focus();
        };
    </script>
</body>
</html>
