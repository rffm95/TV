<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Versão Infalível</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        * { cursor: none !important; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #roleta-screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a000a 0%, #000 100%); }
        
        .wheel-box { position: relative; width: 80vh; height: 80vh; }
        .pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 25px solid transparent; 
            border-right: 25px solid transparent; border-top: 50px solid #fff; z-index: 100;
        }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #D4AF37;
            position: relative; overflow: hidden;
            transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1);
            /* O gradiente começa exatamente no topo e roda para a direita */
            background: conic-gradient(
                from -20deg,
                #D4AF37 0deg 40deg,    /* 0: Jackpot */
                #ff0055 40deg 80deg,   /* 1: Régua */
                #111 80deg 120deg,     /* 2: Tenta */
                #ff0055 120deg 160deg,  /* 3: Fino */
                #111 160deg 200deg,    /* 4: Tenta */
                #ff0055 200deg 240deg,  /* 5: Fino */
                #111 240deg 280deg,    /* 6: Tenta */
                #ff0055 280deg 320deg,  /* 7: Fino */
                #111 320deg 360deg     /* 8: Tenta */
            );
        }

        .slice-text {
            position: absolute; top: 50%; left: 50%; width: 50%; transform-origin: left center;
            color: #fff; font-size: 1.8vh; padding-left: 15vh; text-shadow: 2px 2px 4px #000;
        }

        #resultado {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.98); border: 8px solid #D4AF37; padding: 50px;
            border-radius: 30px; color: #fff; font-size: 5vw; text-align: center; z-index: 200; transition: transform 0.4s;
        }
        #resultado.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="roleta-screen">
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel"></div>
        </div>
    </div>
    <div id="resultado"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const resultado = document.getElementById('resultado');
        let aRodar = false;
        let rotacaoTotal = 0;

        // Lista rigorosa de 9 fatias (40 graus cada)
        const premios = [
            { txt: 'JACKPOT: 5 SHOTS!', win: true },  // 0 a 40 deg
            { txt: 'OFERTA 1 RÉGUA', win: true },     // 40 a 80 deg
            { txt: 'TENTA OUTRA VEZ', win: false },   // 80 a 120 deg
            { txt: 'OFERTA 1 FINO', win: true },      // 120 a 160 deg
            { txt: 'TENTA OUTRA VEZ', win: false },   // 160 a 200 deg
            { txt: 'OFERTA 1 FINO', win: true },      // 200 a 240 deg
            { txt: 'TENTA OUTRA VEZ', win: false },   // 240 a 280 deg
            { txt: 'OFERTA 1 FINO', win: true },      // 280 a 320 deg
            { txt: 'TENTA OUTRA VEZ', win: false }    // 320 a 360 deg
        ];

        // Adicionar os textos visualmente
        premios.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'slice-text';
            div.style.transform = `rotate(${i * 40}deg)`;
            div.innerText = p.txt;
            wheel.appendChild(div);
        });

        function girar() {
            if (aRodar) { resultado.classList.remove('show'); return; }
            
            aRodar = true;
            resultado.classList.remove('show');

            // 1. SORTEIO DE PROBABILIDADE (Jackpot 10%)
            const r = Math.random() * 100;
            let fatiaAlvo;
            if (r < 10) fatiaAlvo = 0; 
            else if (r < 30) fatiaAlvo = 1;
            else if (r < 65) fatiaAlvo = [3, 5, 7][Math.floor(Math.random() * 3)];
            else fatiaAlvo = [2, 4, 6, 8][Math.floor(Math.random() * 4)];

            // 2. CÁLCULO DE ROTAÇÃO (Para parar no centro da fatia sorteada)
            const voltasExtras = 8 * 360; 
            // O segredo está aqui: subtraímos o ângulo da fatia para ela vir para o topo
            const anguloFatia = fatiaAlvo * 40;
            const novaRotacao = voltasExtras + (360 - (rotacaoTotal % 360)) + (360 - anguloFatia);
            rotacaoTotal += novaRotacao;

            wheel.style.transform = `rotate(${rotacaoTotal}deg)`;

            // 3. EXIBIÇÃO DO RESULTADO
            setTimeout(() => {
                const prêmioFinal = premios[fatiaAlvo];
                const cor = prêmioFinal.win ? "#D4AF37" : "#ff0055";
                const titulo = prêmioFinal.win ? "GANHASTE:" : "PERDESTE:";
                
                resultado.innerHTML = `<b style="color:${cor}">${titulo}</b><br>${prêmioFinal.txt}`;
                resultado.classList.add('show');
                aRodar = false;
            }, 6100);
        }

        window.addEventListener('keydown', girar);
        document.addEventListener('mousedown', girar);
    </script>
</body>
</html>
