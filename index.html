<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Roleta Oficial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
        
        * { cursor: none !important; user-select: none; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw;
        }

        .banner {
            border: 4px solid #ff0055;
            padding: 15px 40px;
            border-radius: 20px;
            color: #fff;
            font-size: 1.8vw;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        .main-container {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            width: 95%;
            gap: 20px;
        }

        .premios-lista {
            color: #fff;
            text-align: left;
            min-width: 250px;
        }
        .premios-lista h3 {
            color: #D4AF37;
            font-size: 1.5vw;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .premios-lista p {
            font-size: 1.2vw;
            margin: 8px 0;
            font-weight: 700;
            border-left: 4px solid #ff0055;
            padding-left: 12px;
        }

        .wheel-box { 
            position: relative; 
            width: 75vh; 
            height: 75vh; 
            flex-shrink: 0; 
        }

        .pointer { 
            position: absolute; 
            top: -25px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 35px solid transparent; 
            border-right: 35px solid transparent; 
            border-top: 70px solid #fff; 
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
        }

        .wheel {
            width: 100%; height: 100%; 
            border-radius: 50%; 
            border: 15px solid #D4AF37;
            position: relative; 
            overflow: hidden;
            transition: transform 6s cubic-bezier(0.15, 0, 0, 1);
            background: conic-gradient(
                from -20deg,
                #D4AF37 0deg 40deg, #ff0055 40deg 80deg, #111 80deg 120deg,
                #ff0055 120deg 160deg, #111 160deg 200deg, #ff0055 200deg 240deg,
                #111 240deg 280deg, #ff0055 280deg 320deg, #111 320deg 360deg
            );
        }

        .slice-text {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            width: 50%; 
            height: 0; /* Para alinhar ao centro da fatia */
            transform-origin: left center;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Empurra o texto para a borda da roleta */
        }

        .text-inner {
            color: #fff; 
            font-size: 2.2vh; /* TEXTO MAIOR */
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            padding-right: 40px; /* Distância da borda dourada */
            text-shadow: 2px 2px 4px #000;
            /* Mantém o texto horizontal em relação ao raio da fatia */
            transform: translateY(-50%); 
        }

        .side-title {
            color: #fff; font-size: 3.5vw; font-weight: 900; line-height: 1.1;
            text-align: right;
        }
        .side-title span { color: #ff0055; }
    </style>
</head>
<body>

    <div class="banner">PEDE UMA RÉGUA OU UM PACK E GIRA!</div>

    <div class="main-container">
        <div class="premios-lista">
            <h3>PRÉMIOS POSSÍVEIS:</h3>
            <p>5 SHOTS (JACKPOT)</p>
            <p>1 RÉGUA</p>
            <p>1 FINO</p>
            <p>TENTA OUTRA VEZ</p>
        </div>
        
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel"></div>
        </div>

        <div class="side-title">ROLETA<br><span>DO CHEERS</span></div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        let aRodar = false;
        let rotacaoTotal = 0;

        const fatias = [
            'JACKPOT: 5 SHOTS!', 'OFERTA 1 RÉGUA', 'TENTA OUTRA VEZ',
            'OFERTA 1 FINO', 'TENTA OUTRA VEZ', 'OFERTA 1 FINO',
            'TENTA OUTRA VEZ', 'OFERTA 1 FINO', 'TENTA OUTRA VEZ'
        ];

        fatias.forEach((texto, i) => {
            const div = document.createElement('div');
            div.className = 'slice-text';
            div.style.transform = `rotate(${i * 40}deg)`;
            
            const span = document.createElement('span');
            span.className = 'text-inner';
            span.innerText = texto;
            
            div.appendChild(span);
            wheel.appendChild(div);
        });

        function girar() {
            if (aRodar) return;
            aRodar = true;

            const r = Math.random() * 100;
            let idx;
            if (r < 10) idx = 0; 
            else if (r < 30) idx = 1;
            else if (r < 65) idx = [3, 5, 7][Math.floor(Math.random() * 3)];
            else idx = [2, 4, 6, 8][Math.floor(Math.random() * 4)];

            const voltas = 10 * 360; 
            const anguloFatia = idx * 40;
            const destino = voltas + (360 - (rotacaoTotal % 360)) + (360 - anguloFatia);
            rotacaoTotal += destino;

            wheel.style.transform = `rotate(${rotacaoTotal}deg)`;

            setTimeout(() => { aRodar = false; }, 6100);
        }

        window.addEventListener('keydown', girar);
        document.addEventListener('mousedown', girar);
    </script>
</body>
</html>
