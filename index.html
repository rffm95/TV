<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Versão Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        * { cursor: none !important; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #roleta-screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a000a 0%, #000 100%); }
        
        .wheel-box { position: relative; width: 75vh; height: 75vh; }
        
        /* A SETA É O PONTO DE VERDADE */
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 25px solid transparent; 
            border-right: 25px solid transparent; border-top: 50px solid #fff; z-index: 100;
        }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #D4AF37;
            position: relative; overflow: hidden;
            /* Transição suave de 5 segundos */
            transition: transform 5s cubic-bezier(0.2, 0, 0, 1);
            background: conic-gradient(
                from -20deg,
                #D4AF37 0deg 40deg,    /* 0: Jackpot */
                #ff0055 40deg 80deg,   /* 1: Régua */
                #111 80deg 120deg,     /* 2: Tenta */
                #ff0055 120deg 160deg,  /* 3: Fino */
                #111 160deg 200deg,    /* 4: Tenta */
                #ff0055 200deg 240deg,  /* 5: Fino */
                #111 240deg 280deg,    /* 6: Tenta */
                #ff0055 280deg 320deg,  /* 7: Fino */
                #111 320deg 360deg     /* 8: Tenta */
            );
        }

        .slice-text {
            position: absolute; top: 50%; left: 50%; width: 50%; transform-origin: left center;
            color: #fff; font-size: 1.8vh; padding-left: 12vh; text-shadow: 2px 2px 4px #000; font-weight: 900;
        }

        #resultado {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.95); border: 8px solid #D4AF37; padding: 60px;
            border-radius: 30px; color: #fff; font-size: 5vw; text-align: center; z-index: 200; transition: transform 0.4s;
        }
        #resultado.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="roleta-screen">
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel"></div>
        </div>
    </div>
    <div id="resultado"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const resultado = document.getElementById('resultado');
        let aRodar = false;

        const listaPremios = [
            { t: 'JACKPOT: 5 SHOTS!', w: true },  // 0
            { t: 'OFERTA 1 RÉGUA', w: true },     // 1
            { t: 'TENTA OUTRA VEZ', w: false },   // 2
            { t: 'OFERTA 1 FINO', w: true },      // 3
            { t: 'TENTA OUTRA VEZ', w: false },   // 4
            { t: 'OFERTA 1 FINO', w: true },      // 5
            { t: 'TENTA OUTRA VEZ', w: false },   // 6
            { t: 'OFERTA 1 FINO', w: true },      // 7
            { t: 'TENTA OUTRA VEZ', w: false }    // 8
        ];

        // Posicionar textos
        listaPremios.forEach((p, i) => {
            const el = document.createElement('div');
            el.className = 'slice-text';
            el.style.transform = `rotate(${i * 40}deg)`;
            el.innerText = p.t;
            wheel.appendChild(el);
        });

        function girar() {
            if (aRodar) { resultado.classList.remove('show'); return; }
            
            aRodar = true;
            resultado.classList.remove('show');

            // 1. SORTEIO (Jackpot 10%)
            const r = Math.random() * 100;
            let index;
            if (r < 10) index = 0; 
            else if (r < 30) index = 1;
            else if (r < 65) index = [3, 5, 7][Math.floor(Math.random() * 3)];
            else index = [2, 4, 6, 8][Math.floor(Math.random() * 4)];

            // 2. RESET INSTANTÂNEO (Truque para manter sincronia infinita)
            wheel.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            
            // Forçamos o navegador a processar o reset antes de girar
            void wheel.offsetWidth;

            // 3. GIRAR (10 voltas + ângulo do prémio)
            // Calculamos o ângulo para a fatia X parar no topo: (360 - (index * 40))
            const anguloFinal = (360 * 10) + (360 - (index * 40));
            
            wheel.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.05, 1)';
            wheel.style.transform = `rotate(${anguloFinal}deg)`;

            // 4. MOSTRAR RESULTADO
            setTimeout(() => {
                const p = listaPremios[index];
                const cor = p.w ? "#D4AF37" : "#ff0055";
                const tit = p.w ? "GANHASTE:" : "PERDESTE:";
                
                resultado.innerHTML = `<b style="color:${cor}">${tit}</b><br>${p.t}`;
                resultado.classList.add('show');
                aRodar = false;
            }, 5200);
        }

        window.addEventListener('keydown', girar);
        document.addEventListener('mousedown', girar);
    </script>
</body>
</html>
