<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheers O Bar - TV Display</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #000; overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            cursor: none !important;
        }

        /* Bloqueia o cursor em todo o lado */
        * { cursor: none !important; outline: none !important; -webkit-tap-highlight-color: transparent; }

        #media-container { width: 100vw; height: 100vh; position: relative; }
        .media-player {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; opacity: 0; transition: opacity 1s; z-index: 1;
        }
        .media-player.active { opacity: 1; z-index: 2; }

        /* MENU */
        #tv-menu {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #tv-menu.hidden { display: none; }
        
        .logo-bar {
            color: #fff; font-size: 4vw; font-weight: 900; margin-bottom: 5vh;
            text-transform: uppercase; letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(212,175,55,0.8);
        }
        .menu-row { display: flex; gap: 2.5vw; margin-bottom: 2.5vh; }
        .menu-item {
            color: #888; font-size: 2.5vw; font-weight: 700; padding: 2.2vh 5vw;
            border-radius: 60px; border: 4px solid transparent;
            background: rgba(255,255,255,0.05); text-transform: uppercase;
        }
        /* Classe de foco personalizada */
        .menu-item.active-focus {
            color: #fff; border-color: #D4AF37; background: rgba(212,175,55,0.3);
            transform: scale(1.1); box-shadow: 0 0 40px rgba(212,175,55,0.6);
        }

        #clock { position: absolute; top: 2.5vh; right: 3vw; color: #fff; font-size: 2.4vw; font-weight: 700; z-index: 55; }

        /* Elemento invisível para forçar foco na Hisense */
        #focus-catcher { position: absolute; left: -9999px; top: 0; }

        /* Resto dos estilos simplificados para performance */
        #roleta-container, #cartas-container {
            position: absolute; top:0; left:0; width:100vw; height:100vh;
            display:none; z-index: 100; background: #000;
        }
        .active-game { display: flex !important; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <input type="text" id="focus-catcher" readonly>

    <div id="clock">00:00</div>

    <div id="media-container">
        <video id="video-player" class="media-player" muted playsinline></video>
        <img id="image-player" class="media-player">
    </div>

    <div id="tv-menu">
        <div class="logo-bar">CHEERS O BAR</div>
        <div class="menu-row">
            <div class="menu-item active-focus" id="noite">NOITE</div>
            <div class="menu-item" id="menu">MENU</div>
        </div>
        <div class="menu-row">
            <div class="menu-item" id="roleta-btn">ROLETA</div>
            <div class="menu-item" id="cartas-btn">ALTO OU BAIXO</div>
        </div>
    </div>

    <div id="cartas-container">
        <h1 style="color:#fff; font-size: 5vw;">ALTO OU BAIXO</h1>
        <p style="color:#fff;">(Pressione BACK para Voltar)</p>
    </div>

    <div id="roleta-container">
        <h1 style="color:#fff; font-size: 5vw;">ROLETA</h1>
        <p style="color:#fff;">(Pressione BACK para Voltar)</p>
    </div>

    <script>
        var menuItems = document.querySelectorAll('.menu-item');
        var currentIndex = 0;
        var isMenuOpen = true;
        var focusCatcher = document.getElementById('focus-catcher');

        // 1. FORÇAR FOCO (Vital para Hisense)
        function keepFocus() {
            focusCatcher.focus();
        }

        window.onload = function() {
            keepFocus();
            // Tenta esconder o cursor movendo-o para fora (truque para browsers antigos)
            document.body.style.cursor = 'none';
        };

        // Re-focar se clicar em qualquer lado
        document.addEventListener('click', keepFocus);

        // 2. NAVEGAÇÃO
        function updateFocus() {
            menuItems.forEach((item, index) => {
                if(index === currentIndex) {
                    item.classList.add('active-focus');
                } else {
                    item.classList.remove('active-focus');
                }
            });
        }

        window.addEventListener('keydown', function(e) {
            // Impedir scroll das setas
            if([37, 38, 39, 40, 13].indexOf(e.keyCode) > -1) e.preventDefault();

            var key = e.keyCode;

            // Mapeamento: 37:Esq, 38:Cima, 39:Dir, 40:Baixo, 13:OK
            if (isMenuOpen) {
                if (key === 39) { // Direita
                    currentIndex = (currentIndex + 1) % menuItems.length;
                    updateFocus();
                } 
                else if (key === 37) { // Esquerda
                    currentIndex = (currentIndex - 1 + menuItems.length) % menuItems.length;
                    updateFocus();
                }
                else if (key === 40) { // Baixo
                    if(currentIndex < 2) currentIndex += 2;
                    updateFocus();
                }
                else if (key === 38) { // Cima
                    if(currentIndex >= 2) currentIndex -= 2;
                    updateFocus();
                }
                else if (key === 13) { // OK / ENTER
                    var action = menuItems[currentIndex].id;
                    handleAction(action);
                }
            } else {
                // Se o jogo estiver aberto, o botão BACK (8 ou 27 ou 461) volta ao menu
                if (key === 8 || key === 27 || key === 461 || key === 10009) {
                    location.reload(); // Forma mais segura de resetar na TV
                }
            }
        });

        function handleAction(id) {
            if (id === 'cartas-btn') {
                isMenuOpen = false;
                document.getElementById('tv-menu').classList.add('hidden');
                document.getElementById('cartas-container').classList.add('active-game');
            } else if (id === 'roleta-btn') {
                isMenuOpen = false;
                document.getElementById('tv-menu').classList.add('hidden');
                document.getElementById('roleta-container').classList.add('active-game');
            } else {
                // Lógica de Noite/Menu (Media)
                document.getElementById('tv-menu').classList.add('hidden');
                isMenuOpen = false;
                alert("A carregar media para: " + id);
            }
        }

        // Relógio
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

    </script>
</body>
</html>
