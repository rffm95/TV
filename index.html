<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Roleta Visual Pura</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        * { cursor: none !important; user-select: none; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        #roleta-screen { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle, #1a000a 0%, #000 100%); 
        }

        .wheel-box { position: relative; width: 85vh; height: 85vh; }

        /* A SETA - Único Ponto de Decisão */
        .pointer { 
            position: absolute; 
            top: -20px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 35px solid transparent; 
            border-right: 35px solid transparent; 
            border-top: 70px solid #fff; 
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(255,255,255,0.4));
        }

        .wheel {
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 15px solid #D4AF37;
            position: relative; 
            overflow: hidden;
            transition: transform 6s cubic-bezier(0.1, 0, 0, 1);
            background: conic-gradient(
                from -20deg,
                #D4AF37 0deg 40deg,    /* 0: Jackpot */
                #ff0055 40deg 80deg,   /* 1: Régua */
                #111 80deg 120deg,     /* 2: Tenta */
                #ff0055 120deg 160deg,  /* 3: Fino */
                #111 160deg 200deg,    /* 4: Tenta */
                #ff0055 200deg 240deg,  /* 5: Fino */
                #111 240deg 280deg,    /* 6: Tenta */
                #ff0055 280deg 320deg,  /* 7: Fino */
                #111 320deg 360deg     /* 8: Tenta */
            );
        }

        .slice-text {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            width: 50%; 
            transform-origin: left center;
            color: #fff; 
            font-size: 2.2vh; 
            padding-left: 10vh; 
            text-shadow: 2px 2px 5px #000; 
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="roleta-screen">
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel"></div>
        </div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        let aRodar = false;

        const fatias = [
            'JACKPOT: 5 SHOTS!', // 0
            'OFERTA 1 RÉGUA',    // 1
            'TENTA OUTRA VEZ',   // 2
            'OFERTA 1 FINO',     // 3
            'TENTA OUTRA VEZ',   // 4
            'OFERTA 1 FINO',     // 5
            'TENTA OUTRA VEZ',   // 6
            'OFERTA 1 FINO',     // 7
            'TENTA OUTRA VEZ'    // 8
        ];

        // Colocar os nomes nas fatias
        fatias.forEach((texto, i) => {
            const div = document.createElement('div');
            div.className = 'slice-text';
            div.style.transform = `rotate(${i * 40}deg)`;
            div.innerText = texto;
            wheel.appendChild(div);
        });

        function girar() {
            if (aRodar) return;
            
            aRodar = true;

            // 1. SORTEIO (Mantendo os 10% de Jackpot)
            const r = Math.random() * 100;
            let idx;
            if (r < 10) idx = 0; 
            else if (r < 30) idx = 1;
            else if (r < 65) idx = [3, 5, 7][Math.floor(Math.random() * 3)];
            else idx = [2, 4, 6, 8][Math.floor(Math.random() * 4)];

            // 2. RESET INSTANTÂNEO (Limpa a posição anterior para não haver desvios)
            wheel.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            void wheel.offsetWidth; 

            // 3. MOVIMENTO (Gira 10 voltas e para na fatia sorteada)
            // Usamos o ângulo negativo para bater certo com a direção do desenho
            const voltas = 10 * 360;
            const anguloFinal = voltas + (360 - (idx * 40));
            
            wheel.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)';
            wheel.style.transform = `rotate(${anguloFinal}deg)`;

            // 4. LIBERAR PARA NOVA JOGADA (Sem mensagens!)
            setTimeout(() => {
                aRodar = false;
            }, 6500);
        }

        window.addEventListener('keydown', girar);
        document.addEventListener('mousedown', girar);
    </script>
</body>
</html>
