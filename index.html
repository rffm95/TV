<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Roleta Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        * { cursor: none !important; user-select: none; outline: none !important; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        #roleta-screen {
            position: absolute; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #1a000a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        .main-layout { display: flex; align-items: center; justify-content: center; gap: 5vw; flex: 1; width: 100%; }
        .side-title { color: #fff; font-size: 4vw; font-weight: 900; text-transform: uppercase; line-height: 0.9; text-shadow: 0 0 20px #D4AF37; }
        .side-title span { color: #ff0055; }

        /* CONTENTOR DA RODA */
        .wheel-box { position: relative; width: 68vh; height: 68vh; }
        
        /* SETA */
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 25px solid transparent; 
            border-right: 25px solid transparent; border-top: 45px solid #fff; z-index: 100;
        }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #D4AF37;
            position: relative; overflow: hidden;
            transition: transform 6s cubic-bezier(0.1, 0.8, 0.1, 1);
            background: conic-gradient(
                #111 0deg 40deg,    #ff0055 40deg 80deg,
                #111 80deg 120deg,  #ff0055 120deg 160deg,
                #111 160deg 200deg, #ff0055 200deg 240deg,
                #111 240deg 280deg, #ff0055 280deg 320deg,
                #D4AF37 320deg 360deg
            );
        }

        /* TEXTO ALINHADO NAS FATIAS */
        .slice-text {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 45%; /* Empurra o texto para a borda */
            transform-origin: left center;
            margin-top: -15px; /* Metade da altura da linha para centrar verticalmente na fatia */
            padding-left: 12%; /* Afasta o texto do centro dourado */
            color: #fff;
            font-weight: 900;
            font-size: 1.8vh;
            text-transform: uppercase;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 2px 2px 4px #000;
            white-space: nowrap;
        }

        #resultado {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.95); border: 5px solid #D4AF37; padding: 5vh;
            border-radius: 20px; color: #fff; font-size: 5vw; font-weight: 900;
            text-align: center; z-index: 200; transition: transform 0.5s;
        }
        #resultado.show { transform: translate(-50%, -50%) scale(1); }

        .footer-hint { margin-bottom: 5vh; color: #D4AF37; font-size: 2vw; font-weight: 700; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="roleta-screen">
        <div style="margin-top: 5vh; color: #fff; font-size: 2vw; font-weight: 900; text-transform: uppercase; border: 2px solid #ff0055; padding: 10px 30px; border-radius: 10px;">
            Cheers O Bar - Pede uma Régua e Gira!
        </div>

        <div class="main-layout">
            <div class="side-title">ROLETA<br><span>DO CHEERS</span></div>
            
            <div class="wheel-box">
                <div class="pointer"></div>
                <div id="wheel" class="wheel"></div>
            </div>

            <div class="side-title" style="text-align: right;">GANHA<br><span>PRÉMIOS</span></div>
        </div>

        <div id="hint" class="footer-hint">CARREGA EM QUALQUER BOTÃO PARA GIRAR!</div>
    </div>

    <div id="resultado"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const resultado = document.getElementById('resultado');
        const hint = document.getElementById('hint');
        
        let aRodar = false;
        let rotacaoTotal = 0;

        const fatias = [
            { id: 0, texto: 'TENTA OUTRA VEZ' },
            { id: 1, texto: 'OFERTA 1 FINO' },
            { id: 2, texto: 'OFERTA 1 RÉGUA' },
            { id: 3, texto: 'TENTA OUTRA VEZ' },
            { id: 4, texto: 'OFERTA 1 FINO' },
            { id: 5, texto: 'TENTA OUTRA VEZ' },
            { id: 6, texto: 'OFERTA 1 FINO' },
            { id: 7, texto: 'OFERTA 1 RÉGUA' },
            { id: 8, texto: 'JACKPOT: 5 SHOTS!' }
        ];

        // GERAÇÃO DOS TEXTOS COM ROTAÇÃO CORRIGIDA
        fatias.forEach((f, i) => {
            const span = document.createElement('div');
            span.className = 'slice-text';
            
            // Cada fatia tem 40 graus. 
            // Somamos 20 graus para o texto ficar no MEIO da fatia, não na linha divisória.
            const anguloFatia = (i * 40) + 20; 
            span.style.transform = `rotate(${anguloFatia}deg)`;
            
            span.innerText = f.texto;
            wheel.appendChild(span);
        });

        function girar() {
            if (aRodar) {
                if (resultado.classList.contains('show')) {
                    resultado.classList.remove('show');
                }
                return;
            }

            aRodar = true;
            resultado.classList.remove('show');
            hint.style.visibility = 'hidden';

            const sorte = Math.random() * 100;
            let ganhador;
            if (sorte < 5) ganhador = fatias[8]; // Jackpot
            else if (sorte < 30) ganhador = fatias[Math.random() > 0.5 ? 2 : 7]; // Régua
            else if (sorte < 70) ganhador = fatias[Math.random() > 0.5 ? 1 : 4]; // Fino
            else ganhador = fatias[Math.random() > 0.5 ? 0 : 3]; // Tenta

            // Alinhamento do prémio com o ponteiro (topo)
            // A fatia 0 começa em 0deg. Para a fatia X ficar no topo (270deg no círculo trigonométrico do CSS)
            const anguloFinalFatia = (ganhador.id * 40) + 20;
            const voltas = (Math.floor(Math.random() * 5) + 10) * 360;
            
            // O cálculo garante que a fatia sorteada pare debaixo da seta branca
            rotacaoTotal = voltas + (360 - anguloFinalFatia);
            
            wheel.style.transform = `rotate(${rotacaoTotal}deg)`;

            setTimeout(() => {
                aRodar = false;
                resultado.innerHTML = ganhador.texto + "<br><span style='font-size:2vw; color:#888;'>Carrega para continuar</span>";
                resultado.classList.add('show');
                hint.style.visibility = 'visible';
            }, 6000);
        }

        window.addEventListener('keydown', (e) => {
            e.preventDefault();
            girar();
        });

        document.addEventListener('mousedown', (e) => {
            e.preventDefault();
            girar();
        });
    </script>
</body>
</html>
