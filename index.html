<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Roleta Final Fixa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        * { cursor: none !important; user-select: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; }

        #roleta-screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a000a 0%, #000 100%); }

        .wheel-box { position: relative; width: 75vh; height: 75vh; }
        
        /* SETA - O PONTO ZERO ABSOLUTO */
        .pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 25px solid transparent; 
            border-right: 25px solid transparent; border-top: 50px solid #fff; z-index: 100;
        }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #D4AF37;
            position: relative; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1);
            /* O segredo: o gradiente começa exatamente no topo (0deg) */
            background: conic-gradient(
                from -20deg,
                #D4AF37 0deg 40deg,    /* 0: Jackpot */
                #ff0055 40deg 80deg,   /* 1: Régua */
                #111 80deg 120deg,     /* 2: Tenta */
                #ff0055 120deg 160deg,  /* 3: Fino */
                #111 160deg 200deg,    /* 4: Tenta */
                #ff0055 200deg 240deg,  /* 5: Fino */
                #111 240deg 280deg,    /* 6: Tenta */
                #ff0055 280deg 320deg,  /* 7: Fino */
                #111 320deg 360deg     /* 8: Tenta */
            );
        }

        .slice-text-container {
            position: absolute; top: 50%; left: 50%; width: 50%; height: 2px;
            transform-origin: left center; display: flex; align-items: center; justify-content: flex-end;
        }

        .slice-text { color: #fff; font-size: 1.8vh; padding-right: 40px; text-shadow: 2px 2px 4px #000; text-transform: uppercase; }

        #resultado {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.98); border: 8px solid #D4AF37; padding: 50px;
            border-radius: 30px; color: #fff; font-size: 5vw; text-align: center; z-index: 200; transition: transform 0.4s;
        }
        #resultado.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="roleta-screen">
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel"></div>
        </div>
    </div>

    <div id="resultado"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const resultado = document.getElementById('resultado');
        
        let aRodar = false;
        let voltasBase = 0;

        const fatias = [
            { txt: 'JACKPOT: 5 SHOTS!', win: true },  // 0
            { txt: 'OFERTA 1 RÉGUA', win: true },     // 1
            { txt: 'TENTA OUTRA VEZ', win: false },   // 2
            { txt: 'OFERTA 1 FINO', win: true },      // 3
            { txt: 'TENTA OUTRA VEZ', win: false },   // 4
            { txt: 'OFERTA 1 FINO', win: true },      // 5
            { txt: 'TENTA OUTRA VEZ', win: false },   // 6
            { txt: 'OFERTA 1 FINO', win: true },      // 7
            { txt: 'TENTA OUTRA VEZ', win: false }    // 8
        ];

        // Criar textos alinhados
        fatias.forEach((f, i) => {
            const div = document.createElement('div');
            div.className = 'slice-text-container';
            div.style.transform = `rotate(${i * 40}deg)`;
            div.innerHTML = `<span class="slice-text">${f.txt}</span>`;
            wheel.appendChild(div);
        });

        function girar() {
            if (aRodar) {
                resultado.classList.remove('show');
                return;
            }

            aRodar = true;
            resultado.classList.remove('show');

            // 1. SORTEIO (Jackpot 10%, Régua 20%, Finos 35%, Tenta 35%)
            const r = Math.random() * 100;
            let idx;
            if (r < 10) idx = 0;
            else if (r < 30) idx = 1;
            else if (r < 65) idx = [3, 5, 7][Math.floor(Math.random() * 3)];
            else idx = [2, 4, 6, 8][Math.floor(Math.random() * 4)];

            // 2. ROTAÇÃO FIXA (Sem erros acumulados)
            voltasBase += 10; 
            // O cálculo -(idx * 40) alinha a fatia sorteada com o topo
            const finalDeg = (voltasBase * 360) - (idx * 40);
            
            wheel.style.transform = `rotate(${finalDeg}deg)`;

            // 3. RESULTADO (Apenas o que a seta aponta)
            setTimeout(() => {
                const ganhou = fatias[idx];
                const cor = ganhou.win ? "#D4AF37" : "#ff0055";
                const label = ganhou.win ? "GANHASTE:" : "PERDESTE:";
                
                resultado.innerHTML = `<b style="color:${cor}">${label}</b><br>${ganhou.txt}`;
                resultado.classList.add('show');
                aRodar = false;
            }, 5200);
        }

        window.addEventListener('keydown', girar);
        document.addEventListener('mousedown', girar);
    </script>
</body>
</html>
