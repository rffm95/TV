<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar - Roleta Sincronizada 100%</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap');

        * { cursor: none !important; user-select: none; outline: none !important; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        #roleta-screen {
            position: absolute; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #1a000a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        .main-layout { display: flex; align-items: center; justify-content: center; gap: 5vw; flex: 1; width: 100%; }
        .side-title { color: #fff; font-size: 4vw; font-weight: 900; text-transform: uppercase; line-height: 0.9; text-shadow: 0 0 20px #D4AF37; }
        .side-title span { color: #ff0055; }

        .wheel-box { position: relative; width: 72vh; height: 72vh; }
        
        /* SETA (PONTEIRO) NO TOPO */
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 25px solid transparent; 
            border-right: 25px solid transparent; border-top: 50px solid #fff; z-index: 100;
        }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #D4AF37;
            position: relative; overflow: hidden;
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1); /* Animação suave e longa */
            background: conic-gradient(
                #111 0deg 40deg,    #ff0055 40deg 80deg,
                #111 80deg 120deg,  #ff0055 120deg 160deg,
                #111 160deg 200deg, #ff0055 200deg 240deg,
                #111 240deg 280deg, #ff0055 280deg 320deg,
                #D4AF37 320deg 360deg
            );
        }

        .slice-text-container {
            position: absolute; top: 50%; left: 50%; width: 50%; height: 2px;
            transform-origin: left center; display: flex; align-items: center; justify-content: flex-end;
        }

        .slice-text {
            color: #fff; font-weight: 900; font-size: 1.8vh; text-transform: uppercase;
            padding-right: 40px; text-shadow: 2px 2px 5px #000; white-space: nowrap;
        }

        #resultado {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.98); border: 8px solid #D4AF37; padding: 6vh;
            border-radius: 30px; color: #fff; font-size: 5vw; font-weight: 900;
            text-align: center; z-index: 200; transition: transform 0.5s;
        }
        #resultado.show { transform: translate(-50%, -50%) scale(1); }

        .footer-hint { margin-bottom: 5vh; color: #D4AF37; font-size: 2vw; font-weight: 700; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="roleta-screen">
        <div style="margin-top: 5vh; color: #fff; font-size: 2.5vw; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid #ff0055;">CHEERS O BAR</div>

        <div class="main-layout">
            <div class="side-title">ROLETA<br><span>DO CHEERS</span></div>
            <div class="wheel-box">
                <div class="pointer"></div>
                <div id="wheel" class="wheel"></div>
            </div>
            <div class="side-title" style="text-align: right;">GANHA<br><span>PRÉMIOS</span></div>
        </div>

        <div id="hint" class="footer-hint">CARREGA EM QUALQUER BOTÃO DO COMANDO!</div>
    </div>

    <div id="resultado"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const resultado = document.getElementById('resultado');
        const hint = document.getElementById('hint');
        
        let aRodar = false;
        let rotacaoAcumulada = 0;

        // Lista de fatias exata do CSS (0 a 360 graus)
        const fatias = [
            { id: 0, texto: 'TENTA OUTRA VEZ' }, 
            { id: 1, texto: 'OFERTA 1 FINO' },     
            { id: 2, texto: 'TENTA OUTRA VEZ' }, 
            { id: 3, texto: 'OFERTA 1 FINO' },     
            { id: 4, texto: 'TENTA OUTRA VEZ' }, 
            { id: 5, texto: 'OFERTA 1 FINO' },     
            { id: 6, texto: 'TENTA OUTRA VEZ' }, 
            { id: 7, texto: 'OFERTA 1 RÉGUA' },    
            { id: 8, texto: 'JACKPOT: 5 SHOTS!' }  
        ];

        // Criar textos nas fatias
        fatias.forEach((f, i) => {
            const container = document.createElement('div');
            container.className = 'slice-text-container';
            const anguloTexto = (i * 40) + 20; // Centro da fatia
            container.style.transform = `rotate(${anguloTexto}deg)`;
            const span = document.createElement('span');
            span.className = 'slice-text';
            span.innerText = f.texto;
            container.appendChild(span);
            wheel.appendChild(container);
        });

        function girar() {
            if (aRodar) {
                if (resultado.classList.contains('show')) resultado.classList.remove('show');
                return;
            }

            aRodar = true;
            resultado.classList.remove('show');
            hint.style.visibility = 'hidden';

            // 1. SORTEIO REAL (Lógica de probabilidade)
            const sorte = Math.random() * 100;
            let indexGanhador;
            if (sorte < 5) indexGanhador = 8;        // 5% Jackpot
            else if (sorte < 25) indexGanhador = 7;   // 20% Régua
            else if (sorte < 60) indexGanhador = [1, 3, 5][Math.floor(Math.random() * 3)]; // 35% Finos
            else indexGanhador = [0, 2, 4, 6][Math.floor(Math.random() * 4)]; // 40% Tenta outra vez

            const ganhador = fatias[indexGanhador];

            // 2. MATEMÁTICA DE SINCRONIZAÇÃO
            // Cada fatia tem 40 graus. O centro da fatia i é (i * 40) + 20.
            // Para parar no topo (0 graus), a roda deve rodar 360 - centro_da_fatia.
            const anguloAlvo = 360 - ((indexGanhador * 40) + 20);
            
            // Garantir rotação longa (mínimo 12 voltas extras)
            const voltasExtras = 12 * 360; 
            
            // Cálculo da rotação final acumulada para evitar girar pouco ou para trás
            // Resetamos a base da rotação para a volta atual e somamos o destino
            const voltaAtual = Math.ceil(rotacaoAcumulada / 360);
            rotacaoAcumulada = (voltaAtual * 360) + voltasExtras + anguloAlvo;

            wheel.style.transform = `rotate(${rotacaoAcumulada}deg)`;

            // 3. EXIBIÇÃO DO RESULTADO
            setTimeout(() => {
                aRodar = false;
                resultado.innerHTML = "GANHASTE:<br>" + ganhador.texto + "<br><span style='font-size:1.8vw; color:#888; text-transform: none;'>Qualquer tecla para continuar</span>";
                resultado.classList.add('show');
                hint.style.visibility = 'visible';
            }, 6500); // Aguarda a animação de 6s terminar
        }

        // LIGAR O COMANDO DA TV
        window.addEventListener('keydown', (e) => { e.preventDefault(); girar(); });
        document.addEventListener('mousedown', (e) => { e.preventDefault(); girar(); });
    </script>
</body>
</html>
