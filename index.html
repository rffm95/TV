<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers O Bar TV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        * { 
            cursor: none !important; 
            outline: none !important; 
            user-select: none;
            touch-action: none;
        }

        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: #000; overflow: hidden; 
            font-family: 'Montserrat', sans-serif;
        }

        #tv-menu {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 1000;
        }

        .menu-row { display: flex; gap: 30px; margin-bottom: 30px; }

        /* Botão real com propriedades de sistema */
        .menu-btn {
            background: #1a1a1a; border: 6px solid #333; color: #555;
            padding: 30px 60px; font-size: 3vw; font-weight: 900;
            border-radius: 15px; min-width: 300px;
            transition: all 0.1s;
        }

        /* O que a TV vai mostrar quando selecionado */
        .menu-btn:focus, .menu-btn.selected {
            border-color: #D4AF37 !important;
            color: #fff !important;
            background: #222 !important;
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(212,175,55,0.8);
        }

        .logo { color: #fff; font-size: 6vw; margin-bottom: 5vh; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="tv-menu">
        <div class="logo">CHEERS</div>
        <div class="menu-row">
            <button class="menu-btn" id="noite" tabindex="1">NOITE</button>
            <button class="menu-btn" id="menu" tabindex="2">MENU</button>
        </div>
        <div class="menu-row">
            <button class="menu-btn" id="roleta" tabindex="3">ROLETA</button>
            <button class="menu-btn" id="jogos" tabindex="4">JOGOS</button>
        </div>
    </div>

    <script>
        const buttons = document.querySelectorAll('.menu-btn');
        let index = 0;

        function forceFocus() {
            buttons.forEach(b => b.classList.remove('selected'));
            buttons[index].classList.add('selected');
            buttons[index].focus();
        }

        // Tenta focar brutalmente a cada 500ms até haver interação
        const focusInterval = setInterval(forceFocus, 500);

        function handleOK() {
            const action = buttons[index].id;
            clearInterval(focusInterval);
            document.body.innerHTML = `<h1 style="color:white;text-align:center;margin-top:20%;font-size:5vw;">A CARREGAR: ${action.toUpperCase()}</h1>`;
            // Aqui podes disparar o reload ou a tua função de vídeo
            setTimeout(() => location.reload(), 3000); 
        }

        window.addEventListener('keydown', function(e) {
            // Bloqueia TUDO o que for nativo da TV
            e.preventDefault();
            e.stopPropagation();

            const key = e.keyCode;

            // Navegação
            if (key === 39) { // Direita
                index = (index + 1) % buttons.length;
            } else if (key === 37) { // Esquerda
                index = (index - 1 + buttons.length) % buttons.length;
            } else if (key === 40) { // Baixo
                if (index < 2) index += 2;
            } else if (key === 38) { // Cima
                if (index >= 2) index -= 2;
            } else if (key === 13) { // OK
                handleOK();
            } else if (key === 10009 || key === 8 || key === 461) { // Voltar
                location.reload();
            }

            forceFocus();
        }, true);

        // Se a TV insistir no rato, qualquer clique no ecrã ativa o OK do botão atual
        document.addEventListener('click', function(e) {
            e.preventDefault();
            handleOK();
        });

        // Inicialização
        window.onload = forceFocus;
    </script>
</body>
</html>
